<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TOEIC単語クイズシステム</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --primary: #2563eb; --primary-dark: #1d4ed8;
    --success: #16a34a; --danger: #dc2626; --warn: #d97706;
    --bg: #f8fafc; --card: #ffffff; --border: #e2e8f0;
    --text: #1e293b; --muted: #64748b;
    --level1: #6366f1; --level2: #0ea5e9; --level3: #10b981;
    --level4: #f59e0b; --level5: #ef4444;
  }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  nav { background: var(--primary); color: white; padding: 0 24px; display: flex; align-items: center; height: 56px; gap: 16px; box-shadow: 0 2px 8px rgba(0,0,0,.15); position: sticky; top: 0; z-index: 100; }
  nav .logo { font-size: 18px; font-weight: 700; flex: 1; }
  nav button { background: rgba(255,255,255,.15); border: none; color: white; padding: 6px 16px; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: 600; transition: background .15s; }
  nav button:hover { background: rgba(255,255,255,.25); }
  nav button.active { background: rgba(255,255,255,.3); }

  .page { display: none; padding: 32px 24px; max-width: 860px; margin: 0 auto; }
  .page.visible { display: block; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 24px; margin-bottom: 20px; box-shadow: 0 1px 4px rgba(0,0,0,.05); }

  /* LEVEL SELECT */
  .level-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; margin-top: 16px; }
  .level-card { border: 2px solid var(--border); border-radius: 12px; padding: 20px; cursor: pointer; transition: all .15s; background: white; }
  .level-card:hover { border-color: var(--primary); transform: translateY(-2px); box-shadow: 0 4px 12px rgba(37,99,235,.15); }
  .level-card .badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 700; color: white; margin-bottom: 8px; }
  .level-card h3 { font-size: 16px; margin-bottom: 4px; }
  .level-card .meta { font-size: 13px; color: var(--muted); }
  .level-card .best { margin-top: 10px; font-size: 13px; font-weight: 600; }
  .level-card.cleared { border-color: var(--success); background: #f0fdf4; }

  /* SET SELECT */
  .set-header { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
  .set-header h1 { font-size: 20px; margin: 0; flex: 1; }
  .set-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; }
  .set-card { border: 2px solid var(--border); border-radius: 10px; padding: 16px 12px; cursor: pointer; transition: all .15s; background: white; text-align: center; position: relative; }
  .set-card:hover { border-color: var(--primary); transform: translateY(-2px); box-shadow: 0 4px 12px rgba(37,99,235,.12); }
  .set-card.done { border-color: var(--success); background: #f0fdf4; }
  .set-card .set-num { font-size: 15px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
  .set-card .set-range { font-size: 11px; color: var(--muted); }
  .set-card .set-score { font-size: 12px; font-weight: 700; margin-top: 6px; }
  .set-card .set-check { position: absolute; top: 8px; right: 10px; font-size: 16px; }

  /* QUIZ */
  .quiz-header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
  .back-btn { background: none; border: 1px solid var(--border); color: var(--muted); padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; white-space: nowrap; transition: all .15s; }
  .back-btn:hover { border-color: var(--primary); color: var(--primary); }
  .progress-bar-wrap { flex: 1; background: var(--border); border-radius: 99px; height: 8px; }
  .progress-bar-fill { height: 8px; border-radius: 99px; background: var(--primary); transition: width .3s; }
  .q-counter { font-size: 13px; color: var(--muted); white-space: nowrap; }

  /* 単語表示 */
  .word-display { text-align: center; padding: 28px 20px; background: linear-gradient(135deg, #eff6ff, #dbeafe); border-radius: 12px; margin-bottom: 20px; }
  .word-main { font-size: 40px; font-weight: 800; color: var(--primary); letter-spacing: 1px; margin-bottom: 6px; }
  .word-pos { font-size: 13px; color: var(--muted); background: white; display: inline-block; padding: 2px 10px; border-radius: 20px; border: 1px solid var(--border); }
  .q-lead { font-size: 14px; color: var(--muted); margin-bottom: 12px; }

  /* 選択肢（日本語） */
  .choices { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .choice-btn { background: white; border: 2px solid var(--border); border-radius: 10px; padding: 16px 14px; font-size: 15px; cursor: pointer; text-align: left; transition: all .15s; display: flex; align-items: center; gap: 10px; line-height: 1.4; }
  .choice-btn:hover:not(:disabled) { border-color: var(--primary); background: #eff6ff; }
  .choice-btn .choice-id { font-weight: 700; min-width: 22px; flex-shrink: 0; color: var(--muted); }
  .choice-btn.correct { border-color: var(--success); background: #f0fdf4; color: var(--success); }
  .choice-btn.correct .choice-id { color: var(--success); }
  .choice-btn.wrong { border-color: var(--danger); background: #fef2f2; color: var(--danger); }
  .choice-btn.wrong .choice-id { color: var(--danger); }
  .choice-btn:disabled { cursor: default; }

  /* フィードバック＋例文 */
  .answer-feedback { margin-top: 16px; border-radius: 10px; overflow: hidden; display: none; }
  .feedback-header { padding: 10px 16px; font-size: 15px; font-weight: 700; }
  .feedback-header.ok { background: var(--success); color: white; }
  .feedback-header.ng { background: var(--danger); color: white; }
  .example-box { background: #f8fafc; border: 1px solid var(--border); border-top: none; border-radius: 0 0 10px 10px; padding: 14px 16px; }
  .example-label { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 6px; }
  .example-en { font-size: 15px; font-weight: 600; color: var(--text); margin-bottom: 4px; line-height: 1.6; }
  .example-ja { font-size: 13px; color: var(--muted); line-height: 1.5; }

  .next-btn { margin-top: 16px; padding: 13px 32px; background: var(--primary); color: white; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; width: 100%; transition: background .15s; display: none; }
  .next-btn:hover { background: var(--primary-dark); }

  /* RESULT */
  .result-score { font-size: 64px; font-weight: 800; text-align: center; margin: 8px 0; }
  .result-label { text-align: center; font-size: 18px; font-weight: 600; margin-bottom: 4px; }
  .clear-badge { display: inline-block; background: var(--success); color: white; padding: 4px 16px; border-radius: 20px; font-size: 14px; font-weight: 700; }
  .fail-badge { display: inline-block; background: var(--warn); color: white; padding: 4px 16px; border-radius: 20px; font-size: 14px; font-weight: 700; }
  .result-center { text-align: center; }
  .result-detail table { width: 100%; border-collapse: collapse; font-size: 14px; }
  .result-detail th { background: #f1f5f9; padding: 8px 12px; text-align: left; font-weight: 600; }
  .result-detail td { padding: 8px 12px; border-bottom: 1px solid var(--border); }
  .tag-correct { color: var(--success); font-weight: 700; }
  .tag-wrong { color: var(--danger); font-weight: 700; }
  .btn-row { display: flex; gap: 12px; margin-top: 20px; }
  .btn-secondary { flex: 1; padding: 12px; border: 2px solid var(--primary); color: var(--primary); background: white; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; }
  .btn-primary { flex: 1; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; }
  .btn-home { flex: 1; padding: 12px; border: 2px solid var(--border); color: var(--muted); background: white; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; }

  /* DASHBOARD */
  .stat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px; }
  .stat-card { background: white; border: 1px solid var(--border); border-radius: 12px; padding: 20px; text-align: center; }
  .stat-card .stat-val { font-size: 36px; font-weight: 800; color: var(--primary); }
  .stat-card .stat-label { font-size: 13px; color: var(--muted); margin-top: 4px; }
  .master-bar-wrap { background: var(--border); border-radius: 99px; height: 20px; margin: 16px 0 8px; position: relative; overflow: hidden; }
  .master-bar-fill { height: 20px; background: linear-gradient(90deg, var(--primary), #60a5fa); border-radius: 99px; transition: width 1s ease; }
  .master-bar-text { position: absolute; right: 8px; top: 0; height: 20px; display: flex; align-items: center; font-size: 12px; font-weight: 700; color: white; }
  .master-count { font-size: 28px; font-weight: 800; color: var(--primary); text-align: center; margin-bottom: 4px; }
  .master-sub { font-size: 14px; color: var(--muted); text-align: center; }
  .level-row { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--border); }
  .level-row:last-child { border-bottom: none; }
  .level-row .lname { font-weight: 600; width: 80px; flex-shrink: 0; font-size: 14px; }
  .level-row .lscore { width: 70px; text-align: right; font-size: 14px; font-weight: 700; flex-shrink: 0; }
  .level-row .lbar-wrap { flex: 1; background: var(--border); border-radius: 99px; height: 10px; }
  .level-row .lbar-fill { height: 10px; border-radius: 99px; transition: width 1s ease; }
  .level-row .lstatus { width: 64px; text-align: center; font-size: 12px; font-weight: 700; padding: 2px 8px; border-radius: 20px; flex-shrink: 0; }
  .lstatus.cleared { background: #dcfce7; color: var(--success); }
  .lstatus.progress { background: #fef9c3; color: var(--warn); }
  .lstatus.not-started { background: #f1f5f9; color: var(--muted); }

  h1 { font-size: 22px; margin-bottom: 8px; }
  h2 { font-size: 18px; margin-bottom: 12px; }
  .sub { font-size: 14px; color: var(--muted); margin-bottom: 16px; }
  @media (max-width: 520px) {
    .choices { grid-template-columns: 1fr; }
    .btn-row { flex-direction: column; }
    .word-main { font-size: 30px; }
  }
</style>
</head>
<body>

<nav>
  <span class="logo">📚 TOEIC単語クイズ</span>
  <button id="nav-quiz" class="active" onclick="showPage('quiz')">問題集</button>
  <button id="nav-dash" onclick="showPage('dashboard')">ダッシュボード</button>
</nav>

<!-- QUIZ PAGE -->
<div id="page-quiz" class="page visible">
  <div id="level-select">
    <h1>レベルを選択</h1>
    <p class="sub">目標スコアに合わせてレベルを選んでください。</p>
    <div class="level-grid" id="level-grid"></div>
  </div>

  <div id="set-select" style="display:none;">
    <div class="set-header">
      <button class="back-btn" onclick="backToSelect()">← レベル選択</button>
      <h1 id="set-title"></h1>
    </div>
    <p class="sub" id="set-sub"></p>
    <div class="set-grid" id="set-grid"></div>
  </div>

  <div id="quiz-area" class="card" style="display:none;">
    <div class="quiz-header">
      <button class="back-btn" onclick="confirmBack()">← セット一覧</button>
      <div class="progress-bar-wrap"><div class="progress-bar-fill" id="prog-fill"></div></div>
      <div class="q-counter" id="q-counter"></div>
    </div>
    <div class="word-display">
      <div class="word-main" id="q-word"></div>
      <div class="word-pos" id="q-pos"></div>
    </div>
    <div class="q-lead">次の単語の意味として最も適切なものを選びなさい。</div>
    <div class="choices" id="choices"></div>
    <div class="answer-feedback" id="answer-feedback">
      <div class="feedback-header" id="feedback-header"></div>
      <div class="example-box">
        <div class="example-label">例文</div>
        <div class="example-en" id="example-en"></div>
        <div class="example-ja" id="example-ja"></div>
      </div>
    </div>
    <button class="next-btn" id="next-btn" onclick="nextQuestion()">次の問題へ →</button>
  </div>

  <div id="result-area" class="card" style="display:none;">
    <div class="result-center">
      <div class="result-label">今回の結果</div>
      <div class="result-score" id="res-score"></div>
      <div id="res-badge"></div>
      <div style="font-size:14px;color:var(--muted);margin-top:6px;" id="res-detail-text"></div>
    </div>
    <div class="result-detail" style="margin-top:20px;">
      <h2>問題の振り返り</h2>
      <table id="res-table">
        <thead><tr><th>#</th><th>単語</th><th>意味</th><th>結果</th></tr></thead>
        <tbody id="res-tbody"></tbody>
      </table>
    </div>
    <div id="result-next-btn-wrap" style="margin-top:20px;"></div>
    <div class="btn-row">
      <button class="btn-home" onclick="backToSetSelect()">📋 セット一覧へ</button>
      <button class="btn-secondary" onclick="showPage('dashboard')">ダッシュボード</button>
    </div>
  </div>
</div>

<!-- DASHBOARD PAGE -->
<div id="page-dash" class="page">
  <h1>ダッシュボード</h1>
  <p class="sub">あなたの学習進捗を確認できます。</p>
  <div class="card">
    <h2>総習得単語数</h2>
    <div class="master-count" id="dash-count">0 / 3,000 語</div>
    <div class="master-bar-wrap">
      <div class="master-bar-fill" id="dash-bar" style="width:0%"></div>
      <span class="master-bar-text" id="dash-pct">0%</span>
    </div>
    <div class="master-sub">一度でも正解した単語の累計数</div>
  </div>
  <div class="card">
    <h2>レベル別進捗</h2>
    <div id="level-progress"></div>
  </div>
  <div class="card">
    <h2>統計</h2>
    <div class="stat-grid" id="stat-grid"></div>
  </div>
</div>

<script>
// ============================================================
// WORD DATA  各レベル500語（25セット×20問）= 2,500語
// スキーマ: { id, level, word, part_of_speech, meaning,
//             question_sentence, question_sentence_ja }
// ============================================================
const WORDS = [

{"id":"w_l1_001","level":1,"word":"office","part_of_speech":"noun","meaning":"事務所、職場","question_sentence":"She goes to the office every day by train.","question_sentence_ja":"彼女は毎日電車で職場に通っています。"},

// ============================================================
// CONFIG
// ============================================================
const LEVEL_CONFIG = {
  1: { name: "レベル1", score: "〜300点", color: "var(--level1)", words: 100, description: "中学・高校基礎、超基本ビジネス語" },
  2: { name: "レベル2", score: "301〜500点", color: "var(--level2)", words: 100, description: "日常ビジネス・一般生活" },
  3: { name: "レベル3", score: "501〜700点", color: "var(--level3)", words: 100, description: "業務連絡・オフィス関連" },
  4: { name: "レベル4", score: "701〜850点", color: "var(--level4)", words: 100, description: "経営・組織・少し硬い表現" },
  5: { name: "レベル5", score: "851〜990点", color: "var(--level5)", words: 100, description: "専門的なビジネス・抽象語" },
};
const TOTAL_WORDS = 500;
const SET_SIZE = 20;
const STORAGE_KEY = "toeic_quiz_progress_v3";

// ============================================================
// PROGRESS
// ============================================================
function loadProgress() {
  try { const r = localStorage.getItem(STORAGE_KEY); if (r) return JSON.parse(r); } catch(e) {}
  return { correct_word_ids: [], set_stats: {} };
  // set_stats key: "lv{level}_set{setIdx}" → { score, cleared }
}
function saveProgress(p) { localStorage.setItem(STORAGE_KEY, JSON.stringify(p)); }

// ============================================================
// STATE
// ============================================================
let currentLevel = null, currentSetIdx = null;
let questions = [], currentIdx = 0, answers = [], answered = false;

// ============================================================
// HELPERS
// ============================================================
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; }
  return a;
}
function formatPct(v) { return Math.round(v) + "%"; }
function posLabel(pos) {
  return { noun: "名詞", verb: "動詞", adjective: "形容詞", adverb: "副詞" }[pos] || pos;
}

// レベルの全単語をセット（20語ずつ）に分割
function getSets(level) {
  const pool = WORDS.filter(w => w.level === level);
  const sets = [];
  for (let i = 0; i < pool.length; i += SET_SIZE) sets.push(pool.slice(i, i + SET_SIZE));
  return sets;
}

// 同レベルの単語から日本語選択肢を4つ生成
function buildChoices(word, allLevelWords) {
  const distractors = shuffle(allLevelWords.filter(w => w.id !== word.id)).slice(0, 3);
  return shuffle([
    { text: word.meaning, is_correct: true },
    ...distractors.map(d => ({ text: d.meaning, is_correct: false }))
  ]).map((c, i) => ({ ...c, id: String.fromCharCode(65 + i) }));
}

function setKey(level, setIdx) { return `lv${level}_set${setIdx}`; }

// ============================================================
// PAGE
// ============================================================
function showPage(name) {
  document.getElementById("page-quiz").classList.toggle("visible", name === "quiz");
  document.getElementById("page-dash").classList.toggle("visible", name === "dashboard");
  document.getElementById("nav-quiz").classList.toggle("active", name === "quiz");
  document.getElementById("nav-dash").classList.toggle("active", name === "dashboard");
  if (name === "dashboard") renderDashboard();
  if (name === "quiz") backToSelect();
}

// ============================================================
// LEVEL SELECT
// ============================================================
function renderLevelSelect() {
  const p = loadProgress();
  const grid = document.getElementById("level-grid");
  grid.innerHTML = "";
  for (let lv = 1; lv <= 5; lv++) {
    const cfg = LEVEL_CONFIG[lv];
    const sets = getSets(lv);
    const total = sets.length;
    const doneCount = sets.filter((_, i) => p.set_stats[setKey(lv, i)]?.cleared).length;
    const allDone = total > 0 && doneCount === total;

    const card = document.createElement("div");
    card.className = "level-card" + (allDone ? " cleared" : "");
    card.innerHTML = `
      <span class="badge" style="background:${cfg.color}">${cfg.name}</span>
      <h3>${cfg.score}</h3>
      <div class="meta">${cfg.description}</div>
      <div class="meta" style="margin-top:6px;">${cfg.words.toLocaleString()}語登録 ／ ${total}セット</div>
      <div class="best" style="color:${allDone ? 'var(--success)' : (doneCount > 0 ? cfg.color : 'var(--muted)')}; margin-top:10px; font-size:13px; font-weight:600;">
        ${allDone ? '✅ 全セット完了！' : doneCount > 0 ? `✓ ${doneCount} / ${total} セット完了` : '未挑戦'}
      </div>`;
    card.onclick = () => showSetSelect(lv);
    grid.appendChild(card);
  }
}

// ============================================================
// SET SELECT
// ============================================================
function showSetSelect(level) {
  currentLevel = level;
  const cfg = LEVEL_CONFIG[level];
  const sets = getSets(level);
  const p = loadProgress();

  document.getElementById("level-select").style.display = "none";
  document.getElementById("set-select").style.display = "block";
  document.getElementById("quiz-area").style.display = "none";
  document.getElementById("result-area").style.display = "none";

  document.getElementById("set-title").textContent = `${cfg.name}（${cfg.score}）`;
  const doneCount = sets.filter((_, i) => p.set_stats[setKey(level, i)]?.cleared).length;
  document.getElementById("set-sub").textContent =
    `全${sets.length}セット・各20問。クリア条件：80%以上正解　　完了：${doneCount} / ${sets.length}セット`;

  const grid = document.getElementById("set-grid");
  grid.innerHTML = "";
  sets.forEach((setWords, i) => {
    const stat = p.set_stats[setKey(level, i)];
    const cleared = stat?.cleared;
    const score = stat?.score;
    const start = i * SET_SIZE + 1;
    const end = start + setWords.length - 1;

    const card = document.createElement("div");
    card.className = "set-card" + (cleared ? " done" : "");
    card.innerHTML = `
      ${cleared ? '<span class="set-check">✅</span>' : ''}
      <div class="set-num">セット ${i + 1}</div>
      <div class="set-range">No.${start}〜${end}</div>
      <div class="set-score" style="color:${cleared ? 'var(--success)' : score != null ? 'var(--warn)' : 'var(--muted)'}">
        ${score != null ? formatPct(score) : '未挑戦'}
      </div>`;
    card.onclick = () => startQuiz(level, i);
    grid.appendChild(card);
  });
}

// ============================================================
// QUIZ
// ============================================================
function startQuiz(level, setIdx) {
  currentLevel = level;
  currentSetIdx = setIdx;
  const allLevelWords = WORDS.filter(w => w.level === level);
  const sets = getSets(level);
  const setWords = sets[setIdx];

  // セット内の単語をシャッフルして出題（固定セットだが毎回順番はランダム）
  questions = shuffle(setWords).map(q => ({
    ...q, generatedChoices: buildChoices(q, allLevelWords)
  }));
  currentIdx = 0; answers = []; answered = false;

  document.getElementById("set-select").style.display = "none";
  document.getElementById("quiz-area").style.display = "block";
  document.getElementById("result-area").style.display = "none";
  renderQuestion();
}

function renderQuestion() {
  answered = false;
  const q = questions[currentIdx];
  const total = questions.length;

  document.getElementById("prog-fill").style.width = ((currentIdx / total) * 100) + "%";
  document.getElementById("q-counter").textContent = `${currentIdx + 1} / ${total} 問`;
  document.getElementById("q-word").textContent = q.word;
  document.getElementById("q-pos").textContent = posLabel(q.part_of_speech);

  const choicesEl = document.getElementById("choices");
  choicesEl.innerHTML = "";
  q.generatedChoices.forEach(c => {
    const btn = document.createElement("button");
    btn.className = "choice-btn";
    btn.innerHTML = `<span class="choice-id">${c.id}</span>${c.text}`;
    btn.onclick = () => selectAnswer(c, btn, q);
    choicesEl.appendChild(btn);
  });

  document.getElementById("answer-feedback").style.display = "none";
  document.getElementById("next-btn").style.display = "none";
}

function selectAnswer(choice, btn, q) {
  if (answered) return;
  answered = true;
  const isCorrect = choice.is_correct;
  answers.push({ word_id: q.id, word: q.word, meaning: q.meaning, correct: isCorrect });

  document.querySelectorAll(".choice-btn").forEach(b => {
    b.disabled = true;
    const id = b.querySelector(".choice-id").textContent;
    const ch = q.generatedChoices.find(c => c.id === id);
    if (ch && ch.is_correct) b.classList.add("correct");
  });
  if (!isCorrect) btn.classList.add("wrong");

  const fb = document.getElementById("answer-feedback");
  fb.style.display = "block";
  const hdr = document.getElementById("feedback-header");
  if (isCorrect) {
    hdr.className = "feedback-header ok";
    hdr.textContent = `✅ 正解！　${q.word} ＝ ${q.meaning}`;
  } else {
    hdr.className = "feedback-header ng";
    hdr.textContent = `❌ 不正解。正解は「${q.meaning}」`;
  }
  document.getElementById("example-en").textContent = q.question_sentence;
  document.getElementById("example-ja").textContent = q.question_sentence_ja;

  const nb = document.getElementById("next-btn");
  nb.style.display = "block";
  nb.textContent = currentIdx + 1 < questions.length ? "次の問題へ →" : "結果を見る";
}

function nextQuestion() {
  currentIdx++;
  if (currentIdx < questions.length) renderQuestion();
  else showResult();
}

function showResult() {
  document.getElementById("quiz-area").style.display = "none";
  document.getElementById("result-area").style.display = "block";

  const correct = answers.filter(a => a.correct).length;
  const total = answers.length;
  const pct = Math.round((correct / total) * 100);
  const cleared = pct >= 80;

  // 進捗保存
  const p = loadProgress();
  const sk = setKey(currentLevel, currentSetIdx);
  const prev = p.set_stats[sk];
  p.set_stats[sk] = { score: Math.max(pct, prev?.score ?? 0), cleared: cleared || (prev?.cleared ?? false) };
  answers.filter(a => a.correct).forEach(a => {
    if (!p.correct_word_ids.includes(a.word_id)) p.correct_word_ids.push(a.word_id);
  });
  saveProgress(p);

  document.getElementById("res-score").textContent = formatPct(pct);
  document.getElementById("res-score").style.color = cleared ? "var(--success)" : "var(--warn)";
  document.getElementById("res-badge").innerHTML = cleared
    ? `<span class="clear-badge">🎉 クリア！（${correct}/${total}問正解）</span>`
    : `<span class="fail-badge">あと少し！（${correct}/${total}問正解）</span>`;

  const sets = getSets(currentLevel);
  const nextIdx = currentSetIdx + 1;
  const hasNext = nextIdx < sets.length;
  const wrap = document.getElementById("result-next-btn-wrap");
  if (hasNext) {
    wrap.innerHTML = `<button class="btn-primary" style="width:100%;padding:16px;font-size:17px;"
      onclick="startQuiz(${currentLevel}, ${nextIdx})">
      ▶ セット ${nextIdx + 1} に進む →
    </button>`;
  } else {
    wrap.innerHTML = `<div style="text-align:center;padding:14px;background:#f0fdf4;border-radius:8px;color:var(--success);font-weight:700;">
      🏆 このレベルの全セット完了！
    </div>`;
  }

  document.getElementById("res-detail-text").textContent =
    `このセットの最高スコア：${formatPct(p.set_stats[sk].score)}　　セット ${currentSetIdx + 1} / ${sets.length}`;

  const tbody = document.getElementById("res-tbody");
  tbody.innerHTML = answers.map((a, i) =>
    `<tr><td>${i+1}</td><td>${a.word}</td><td>${a.meaning}</td>
     <td class="${a.correct ? 'tag-correct' : 'tag-wrong'}">${a.correct ? '○' : '✕'}</td></tr>`
  ).join("");
}

function confirmBack() {
  if (answered || currentIdx === 0) { backToSetSelect(); return; }
  if (confirm("問題の途中です。セット一覧に戻りますか？（進捗は保存されません）")) backToSetSelect();
}

function backToSetSelect() {
  document.getElementById("result-area").style.display = "none";
  document.getElementById("quiz-area").style.display = "none";
  if (currentLevel) showSetSelect(currentLevel);
  else backToSelect();
}

function backToSelect() {
  document.getElementById("result-area").style.display = "none";
  document.getElementById("quiz-area").style.display = "none";
  document.getElementById("set-select").style.display = "none";
  document.getElementById("level-select").style.display = "block";
  renderLevelSelect();
}

// ============================================================
// DASHBOARD
// ============================================================
function renderDashboard() {
  const p = loadProgress();
  const n = p.correct_word_ids.length;
  const pct = Math.min((n / TOTAL_WORDS) * 100, 100);
  document.getElementById("dash-count").textContent = `${n.toLocaleString()} / ${TOTAL_WORDS.toLocaleString()} 語`;
  document.getElementById("dash-bar").style.width = pct + "%";
  document.getElementById("dash-pct").textContent = pct.toFixed(1) + "%";

  const lp = document.getElementById("level-progress");
  lp.innerHTML = "";
  let cleared = 0, totalBest = 0, attempted = 0;
  for (let lv = 1; lv <= 5; lv++) {
    const cfg = LEVEL_CONFIG[lv], stat = p.level_stats[`level_${lv}`];
    const best = stat.highest_score_percent;
    if (best > 0) { totalBest += best; attempted++; }
    if (stat.is_cleared) cleared++;
    let sc = "not-started", st = "未挑戦";
    if (stat.is_cleared) { sc = "cleared"; st = "クリア"; }
    else if (best > 0) { sc = "progress"; st = "挑戦中"; }
    const row = document.createElement("div");
    row.className = "level-row";
    row.innerHTML = `
      <span class="lname" style="color:${cfg.color}">${cfg.name}</span>
      <div class="lbar-wrap"><div class="lbar-fill" style="width:${best}%;background:${cfg.color}"></div></div>
      <span class="lscore" style="color:${cfg.color}">${best > 0 ? formatPct(best) : '---'}</span>
      <span class="lstatus ${sc}">${st}</span>`;
    lp.appendChild(row);
  }

  const avg = attempted > 0 ? Math.round(totalBest / attempted) : 0;
  document.getElementById("stat-grid").innerHTML = [
    { val: cleared + "/5", label: "クリア済みレベル" },
    { val: avg > 0 ? formatPct(avg) : "---", label: "平均スコア" },
    { val: n.toLocaleString(), label: "習得単語数" },
    { val: pct.toFixed(1) + "%", label: "全体進捗" },
  ].map(s => `<div class="stat-card"><div class="stat-val">${s.val}</div><div class="stat-label">${s.label}</div></div>`).join("");
}

// ============================================================
// INIT
// ============================================================
renderLevelSelect();
</script>
